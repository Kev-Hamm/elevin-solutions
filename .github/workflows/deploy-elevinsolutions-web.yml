name: Deploy elevinsolutions-web to GitHub Pages

on:
  push:
    branches:
      - feature/api-integration
    paths:
      - 'elevinsolutions-web/**'
      - '.github/workflows/deploy-elevinsolutions-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: elevinsolutions-web/package-lock.json

      - name: Install dependencies
        working-directory: elevinsolutions-web
        run: |
          npm ci || npm install

      - name: Build Angular app (base-href=/DirtyCLAW/)
        working-directory: elevinsolutions-web
        run: |
          npm run build -- --base-href "/DirtyCLAW/"

      - name: Ensure 404.html fallback exists for SPA routing
        working-directory: elevinsolutions-web
        run: |
          cp dist/elevinsolutions-web/index.html dist/elevinsolutions-web/404.html || true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: elevinsolutions-web/dist/elevinsolutions-web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
