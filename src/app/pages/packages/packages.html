<section class="section">
  <div class="section__inner">
    <div class="section__head">
      <h1>Packages</h1>
      <p class="muted">
        Choose a package, then personalize with add-ons like charcuterie, florals, and photography.
      </p>
    </div>

    <div class="grid cards">
      <article class="card" *ngFor="let p of packages">
        <div class="card__top">
          <div class="card__badge" *ngIf="p.badge">{{ p.badge }}</div>
          <div class="card__icon" aria-hidden="true"></div>
        </div>

        <h3>{{ p.title }}</h3>
        <p class="muted">{{ p.description }}</p>

        <div class="card__footer">
          <div class="price">{{ p.price }}</div>
          <a class="btn btn--small btn--primary" routerLink="['/']" fragment="book">Book</a>
        </div>
      </article>
    </div>
  </div>
</section>
